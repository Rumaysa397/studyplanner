<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudySync Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background-color:#f4f6f9;
}

.dashboard-title{
    color:#0d6efd;
    font-weight:bold;
}

.card{
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

</style>

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container">

<a class="navbar-brand fw-bold" href="index.html">
📚 StudySync
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="index.html">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="planner.html">Planner</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="dashboard.html">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="about.html">About</a>
</li>

<li class="nav-item">
<a class="nav-link" href="contact.html">Contact</a>
</li>

</ul>

</div>
</div>
</nav>

<!-- Main Section -->

<div class="container py-5">

<h1 class="text-center dashboard-title mb-5">
Student Dashboard
</h1>

<div class="row g-4">

<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h2 id="totalTasks">0</h2>

<h5>Total Tasks</h5>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h2 id="completedTasks">0</h2>

<h5>Completed</h5>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h2 id="pendingTasks">0</h2>

<h5>Pending</h5>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h2 id="studyHours">4</h2>

<h5>Study Hours</h5>

</div>

</div>

</div>

</div>

<!-- Progress Section -->

<div class="card shadow mt-5">

<div class="card-body">

<h4 class="mb-3">
Study Progress
</h4>

<div class="progress" style="height:30px">

<div
id="progressBar"
class="progress-bar progress-bar-striped progress-bar-animated"
style="width:70%">
70%
</div>

</div>

</div>

</div>

<!-- Motivation -->

<div class="card shadow mt-5">

<div class="card-body text-center">

<h4>Motivation Corner</h4>

<p id="quote">
Success doesn't come from what you do occasionally,
it comes from what you do consistently.
</p>

<button class="btn btn-primary"
onclick="newQuote()">
New Quote
</button>

</div>

</div>

</div>

<script>

let quotes = [

"Success doesn't come from what you do occasionally, it comes from what you do consistently.",

"Dream big. Start small. Act now.",

"Discipline beats motivation.",

"Small progress is still progress.",

"Focus on your goal, not the obstacles."

];

function newQuote(){

let random =
Math.floor(Math.random()*quotes.length);

document.getElementById("quote").innerHTML =
quotes[random];

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

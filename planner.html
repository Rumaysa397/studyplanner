<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>StudySync Planner</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color:#f4f6f9;
}

.task-card{
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Study Planner</h2>

    <div class="card p-4 shadow">

        <div class="mb-3">
            <label class="form-label">Subject</label>
            <input type="text" id="subject" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Task</label>
            <input type="text" id="task" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Due Date</label>
            <input type="date" id="date" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Priority</label>
            <select id="priority" class="form-select">
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
            </select>
        </div>

        <button class="btn btn-primary" onclick="addTask()">
            Add Task
        </button>

    </div>

    <div id="taskList" class="mt-4"></div>

</div>

<script>

function addTask(){

    let subject = document.getElementById("subject").value;
    let task = document.getElementById("task").value;
    let date = document.getElementById("date").value;
    let priority = document.getElementById("priority").value;

    if(subject==="" || task==="" || date===""){
        alert("Please fill all fields");
        return;
    }

    let taskCard = document.createElement("div");

    taskCard.className = "card shadow task-card";

    taskCard.innerHTML = `
        <div class="card-body">
            <h5>${subject}</h5>
            <p>${task}</p>
            <p><strong>Due:</strong> ${date}</p>
            <p><strong>Priority:</strong> ${priority}</p>

            <button class="btn btn-success btn-sm"
            onclick="markComplete(this)">
            Complete
            </button>

            <button class="btn btn-danger btn-sm"
            onclick="deleteTask(this)">
            Delete
            </button>
        </div>
    `;

    document.getElementById("taskList").appendChild(taskCard);

    document.getElementById("subject").value="";
    document.getElementById("task").value="";
    document.getElementById("date").value="";
}

function deleteTask(button){
    button.closest(".card").remove();
}

function markComplete(button){

    let card = button.closest(".card");

    card.style.textDecoration = "line-through";
    card.style.opacity = "0.6";
}

</script>

</body>
</html>
